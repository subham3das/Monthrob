<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Address Book | monthrob.in</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />

    <style>
      :root {
        --beige: #F5F5F0;
        --black: #0F0F0F;
        --white: #FFFFFF;
        --gray: #F9F9F9;
        --sage: #7B8C7C;
        --border-color: #E2E2E2;
        --transition: 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--white);
        color: var(--black);
        padding-bottom: 100px;
      }

      /* --- NAVBAR --- */
      .navbar {
        position: fixed;
        width: 100%;
        top: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 30px;
        background: rgba(245, 245, 220, 0.95);
        backdrop-filter: blur(10px);
        z-index: 1000;
        border-bottom: 1px solid var(--border-color);
      }

      .nav-title {
        font-weight: 800;
        font-size: 18px;
      }

      /* --- CONTENT --- */
      .container {
        margin-top: 80px;
        padding: 20px;
        min-height: calc(100vh - 400px); /* Ensure container has height even if empty */
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #888;
      }

      .empty-state i {
        font-size: 64px;
        margin-bottom: 20px;
        opacity: 0.3;
      }

      .empty-state h2 {
        font-size: 18px;
        font-weight: 700;
        color: var(--black);
        margin-bottom: 10px;
      }

      .empty-state p {
        font-size: 14px;
        margin-bottom: 30px;
      }

      .address-card {
        background: var(--beige);
        border: 1.5px solid var(--border-color);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
        position: relative;
        transition: transform 0.2s;
      }

      .address-card.default {
        border-color: var(--black);
      }

      .default-badge {
        position: absolute;
        top: 20px;
        right: 20px;
        background: var(--black);
        color: var(--white);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .address-card h3 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .address-card p {
        font-size: 14px;
        color: #555;
        line-height: 1.6;
      }

      .address-actions {
        display: flex;
        gap: 20px;
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid var(--border-color);
      }

      .action-btn {
        font-size: 13px;
        font-weight: 700;
        color: var(--black);
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }

      .action-btn.delete {
        color: #e74c3c;
      }

      .btn-add-address {
        width: 100%;
        padding: 18px;
        background: var(--white);
        border: 2px dashed var(--border-color);
        border-radius: 20px;
        color: #888;
        font-weight: 700;
        font-size: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: var(--transition);
      }

      .btn-add-address:hover {
        background: #fdfdf5;
        border-color: var(--black);
        color: var(--black);
      }

      /* --- MODAL --- */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        padding: 20px;
      }

      .modal-content {
        background: var(--white);
        width: 100%;
        max-width: 500px;
        border-radius: 24px;
        padding: 30px;
        position: relative;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .modal-header h2 {
        font-size: 20px;
        font-weight: 800;
      }

      .close-modal {
        font-size: 24px;
        cursor: pointer;
        color: #888;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
        color: #555;
      }

      .form-group input {
        width: 100%;
        padding: 14px 18px;
        border-radius: 12px;
        border: 1.5px solid var(--border-color);
        font-family: inherit;
        font-size: 14px;
        outline: none;
        transition: var(--transition);
      }

      .form-group input:focus {
        border-color: var(--black);
      }

      .form-row {
        display: flex;
        gap: 15px;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
      }

      .checkbox-group input {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .btn-submit {
        width: 100%;
        padding: 16px;
        background: var(--black);
        color: var(--white);
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        margin-top: 10px;
      }

    </style>
  </head>
  <body>
    
    <nav class="navbar">
      <i class="bx bx-arrow-back" style="font-size: 24px; cursor: pointer;" onclick="history.back()"></i>
      <span class="nav-title">Address Book</span>
      <i class="bx bx-plus" style="font-size: 24px; opacity: 0;"></i>
    </nav>

    <main class="container" id="addressContainer">
      <!-- Dynamic Content -->
    </main>

    <!-- Address Modal -->
    <div class="modal-overlay" id="addressModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Add New Address</h2>
          <i class="bx bx-x close-modal" onclick="closeModal()"></i>
        </div>
        <form id="addressForm" onsubmit="submitAddress(event)">
          <input type="hidden" id="addressId">
          <div class="form-group">
            <label>Address Label (e.g. Home, Office)</label>
            <input type="text" id="label" placeholder="Home" required>
          </div>
          <div class="form-group">
            <label>Street Address</label>
            <input type="text" id="street" placeholder="742 Evergreen Terrace" required>
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:2">
              <label>City</label>
              <input type="text" id="city" placeholder="Springfield" required>
            </div>
            <div class="form-group" style="flex:1">
              <label>State</label>
              <input type="text" id="state" placeholder="OR" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:1">
              <label>Zip Code</label>
              <input type="text" id="zip" placeholder="97403" required>
            </div>
            <div class="form-group" style="flex:1">
              <label>Country</label>
              <input type="text" id="country" placeholder="USA" required>
            </div>
          </div>
          <div class="form-group">
            <label>Phone Number <span style="color:#e74c3c; margin-left: 2px;">*</span></label>
            <div style="display: flex; gap: 10px;">
                <select id="countryCode" style="width: 110px; padding: 14px 10px; border-radius: 12px; border: 1.5px solid var(--border-color); font-family: inherit; font-size: 14px; outline: none; cursor: pointer;">
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+44">🇬🇧 +44</option>
                    <option value="+91" selected>🇮🇳 +91</option>
                    <option value="+81">🇯🇵 +81</option>
                    <option value="+61">🇦🇺 +61</option>
                    <option value="+971">🇦🇪 +971</option>
                </select>
                <input type="tel" id="phone" pattern="[0-9]{10}" minlength="10" maxlength="10" title="Please enter a valid 10-digit phone number" placeholder="10 Digit Number..." required style="flex: 1;">
            </div>
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="isDefault">
            <label for="isDefault" style="margin-bottom:0">Set as default address</label>
          </div>
          <button type="submit" class="btn-submit">Save Address</button>
        </form>
      </div>
    </div>

    <!-- Footer Container -->
    <div id="footerContainer"></div>

    <!-- Bottom Nav Container -->
    <div id="bottomNavContainer"></div>

    <script src="../backend/api/mock-db.js"></script>
    <script>
      // Authentication Guard
      if (!localStorage.getItem('monthrob_token')) {
        window.location.href = './login.html';
      }

      let currentAddresses = [];

      document.addEventListener("DOMContentLoaded", () => {
        loadData();
        loadComponent('./navbar.html', 'bottomNavContainer', () => {
            setTimeout(() => {
                const navItems = document.querySelectorAll('.mobile-bottom-nav .nav-item');
                navItems.forEach(item => item.classList.remove('active'));
                const profileTab = document.getElementById('nav-profile');
                if (profileTab) profileTab.classList.add('active');
            }, 50);
        });
        loadComponent('./footer.html', 'footerContainer');
      });

      async function loadData() {
        try {
          const user = await monthrob_DB.getUser();
          if (user) {
            currentAddresses = user.addresses || [];
            renderAddresses(currentAddresses);
          }
        } catch (err) { console.error('Load Error:', err); }
      }

      function renderAddresses(addresses) {
        const container = document.getElementById('addressContainer');
        let html = '';

        if (addresses.length === 0) {
          html = `
            <div class="empty-state">
              <i class='bx bx-map-pin'></i>
              <h2>No Saved Addresses</h2>
              <p>Add a shipping address to speed up your checkout process.</p>
              <button class="btn-submit" onclick="openModal('add')" style="max-width: 200px; margin: 0 auto;">Add Address</button>
            </div>
          `;
        } else {
          addresses.forEach(addr => {
            html += `
              <div class="address-card ${addr.isDefault ? 'default' : ''}">
                ${addr.isDefault ? '<div class="default-badge">Default</div>' : ''}
                <h3>${addr.label}</h3>
                <p>${addr.street}</p>
                <p>${addr.city}, ${addr.state} ${addr.zip}</p>
                <p>${addr.country}</p>
                <p style="margin-top: 5px; font-weight: 600; font-size: 13px; color: #333;"><i class='bx bx-phone'></i> ${addr.phone || 'N/A'}</p>
                
                <div class="address-actions">
                  <div class="action-btn" onclick="openModal('edit', '${addr._id}')"><i class='bx bx-edit'></i> Edit</div>
                  <div class="action-btn delete" onclick="removeAddress('${addr._id}')"><i class='bx bx-trash'></i> Remove</div>
                </div>
              </div>
            `;
          });

          html += `
            <div class="btn-add-address" onclick="openModal('add')">
              <i class='bx bx-plus-circle'></i> Add New Address
            </div>
          `;
        }

        container.innerHTML = html;
      }

      function openModal(mode, id = null) {
        const modal = document.getElementById('addressModal');
        const title = document.getElementById('modalTitle');
        const form = document.getElementById('addressForm');
        
        form.reset();
        document.getElementById('addressId').value = id || '';
        
        if (mode === 'edit') {
          title.innerText = 'Edit Address';
          const addr = currentAddresses.find(a => a._id === id);
          if (addr) {
            document.getElementById('label').value = addr.label;
            document.getElementById('street').value = addr.street;
            document.getElementById('city').value = addr.city;
            document.getElementById('state').value = addr.state;
            document.getElementById('zip').value = addr.zip || '';
            document.getElementById('country').value = addr.country || '';
            
            if (addr.phone) {
                const parts = addr.phone.split(' ');
                if (parts.length > 1) {
                    document.getElementById('countryCode').value = parts[0];
                    document.getElementById('phone').value = parts[1];
                } else {
                    document.getElementById('phone').value = addr.phone;
                }
            } else {
                document.getElementById('countryCode').value = '+91';
                document.getElementById('phone').value = '';
            }

            document.getElementById('isDefault').checked = addr.isDefault;
          }
        } else {
          title.innerText = 'Add New Address';
        }
        
        modal.style.display = 'flex';
      }

      function closeModal() {
        document.getElementById('addressModal').style.display = 'none';
      }

      async function submitAddress(e) {
        e.preventDefault();
        const id = document.getElementById('addressId').value;
        const data = {
          label: document.getElementById('label').value,
          street: document.getElementById('street').value,
          city: document.getElementById('city').value,
          state: document.getElementById('state').value,
          zip: document.getElementById('zip').value,
          country: document.getElementById('country').value,
          phone: document.getElementById('countryCode').value + ' ' + document.getElementById('phone').value,
          isDefault: document.getElementById('isDefault').checked
        };

        try {
          let updatedAddresses;
          if (id) {
            updatedAddresses = await monthrob_DB.updateAddress(id, data);
          } else {
            updatedAddresses = await monthrob_DB.addAddress(data);
          }
          
          if (updatedAddresses) {
            currentAddresses = updatedAddresses;
            renderAddresses(currentAddresses);
            closeModal();
            if (window.showToast) showToast('Address saved successfully!', 'success');
          }
        } catch (err) {
          console.error('Submit Error:', err);
          if (window.showToast) showToast('Error saving address', 'error');
        }
      }

      async function removeAddress(id) {
        if (!confirm("Are you sure you want to remove this address?")) return;
        try {
          const updatedAddresses = await monthrob_DB.deleteAddress(id);
          if (updatedAddresses) {
            currentAddresses = updatedAddresses;
            renderAddresses(currentAddresses);
            if (window.showToast) showToast('Address removed', 'primary');
          }
        } catch (err) { 
            console.error('Remove Error:', err);
            if (window.showToast) showToast('Failed to remove address', 'error');
        }
      }

      async function loadComponent(url, containerId, callback) {
        try {
          const res = await fetch(url);
          const html = await res.text();
          const container = document.getElementById(containerId);
          if (container) {
            container.innerHTML = html;
            container.querySelectorAll('script').forEach(s => {
              const ns = document.createElement('script');
              ns.textContent = s.textContent;
              document.body.appendChild(ns);
            });
            if (callback) callback(html);
          }
        } catch (err) { console.error(`Error loading component ${url}:`, err); }
      }
    </script>
  </body>
</html>
