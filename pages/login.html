<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | monthrob.in</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>  
      :root {
        --beige: #F5F5F0;
        --black: #0F0F0F;
        --white: #FFFFFF;
        --gray: #F9F9F9;
        --sage: #7B8C7C;
        --border-color: #E2E2E2;
        --transition: 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--white);
        color: var(--black);
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .auth-container {
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .logo-area {
        margin-bottom: 40px;
      }

      .logo-area h1 { text-transform: lowercase;   
        font-size: 48px;
        font-weight: 900;
        letter-spacing: -2px;
      }

      .logo-area p {
        font-size: 12px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 2px;
        opacity: 0.6;
        margin-top: -5px;
      }

      .auth-card {
        background: var(--beige);
        border: 1.5px solid var(--border-color);
        border-radius: 24px;
        padding: 40px 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.03);
      }

      .auth-card h2 {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 10px;
      }

      .auth-card p.subtitle {
        font-size: 14px;
        color: #777;
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }

      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 8px;
        color: #888;
      }

      .form-group input {
        width: 100%;
        padding: 14px 20px;
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-size: 15px;
        font-family: inherit;
        outline: none;
        transition: var(--transition);
      }

      .form-group input:focus {
        border-color: var(--black);
        box-shadow: 0 0 0 4px rgba(0,0,0,0.03);
      }

      .forgot-link {
        display: block;
        text-align: right;
        font-size: 13px;
        font-weight: 600;
        color: var(--black);
        margin-top: -10px;
        margin-bottom: 25px;
        text-decoration: none;
      }

      .btn-primary {
        width: 100%;
        padding: 16px;
        background: var(--black);
        color: var(--white);
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
      }

      .btn-primary:hover {
        opacity: 0.9;
      }

      .btn-primary:active {
        transform: scale(0.98);
      }

      .social-divider {
        margin: 30px 0;
        display: flex;
        align-items: center;
        gap: 15px;
        color: #ccc;
        font-size: 12px;
        font-weight: 600;
      }

      .social-divider::before, .social-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border-color);
      }

      .social-btns {
        display: flex;
        gap: 15px;
      }

      .social-btn {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 14px;
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        cursor: pointer;
        transition: var(--transition);
      }

      .social-btn i {
        font-size: 20px;
      }

      .social-btn:hover {
        background: #fdfdfd;
        border-color: #bbb;
      }

      .auth-footer {
        margin-top: 40px;
        font-size: 14px;
        color: #777;
      }

      .auth-footer a {
        color: var(--black);
        font-weight: 800;
        text-decoration: none;
      }

      /* Home Link */
      .home-back {
        position: absolute;
        top: 30px;
        left: 30px;
        font-size: 24px;
        color: var(--black);
      }
    </style>
  </head>
  <body>
    
    <a href="./home.html" class="home-back"><i class='bx bx-chevron-left'></i></a>

    <div class="auth-container">
      <div class="logo-area">
        <h1><span style="color: #E53935;">mon</span>throb</h1>
        <p>Aesthetics Defined</p>
      </div>

      <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your luxury account</p>

        <form id="loginForm">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
          <a href="passreset.html" class="forgot-link">Forgot Password?</a>
          <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
        </form>

        <div class="social-divider">OR CONTINUE WITH</div>

        <div class="social-btns">
          <div id="googleBtn" style="width: 100%; display: flex; justify-content: center;"></div>
        </div>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="createaccount.html">Create Account</a>
      </div>
    </div>

    <script>
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.innerText = 'Signing in...';
        btn.disabled = true;

        try {
          const apiBase = 'https://monbackend.vercel.app/api';
          console.log('Attempting login to:', apiBase + '/auth/login');

          const res = await fetch(`${apiBase}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('monthrob_token', data.token);
            localStorage.setItem('monthrob_user', JSON.stringify(data.user));
            window.location.href = './home.html';
          } else {
            alert(data.error || 'Login failed');
          }
        } catch (err) {
          alert('Network error connecting to server');
        } finally {
          btn.innerText = 'Sign In';
          btn.disabled = false;
        }
      });

      // Google Sign-In Logic
      function handleCredentialResponse(response) {
        console.log("Encoded JWT ID token: " + response.credential);
        
        const apiBase = 'https://monbackend.vercel.app/api';

        fetch(`${apiBase}/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: response.credential })
        })
        .then(res => res.json())
        .then(data => {
          if (data.token) {
            localStorage.setItem('monthrob_token', data.token);
            localStorage.setItem('monthrob_user', JSON.stringify(data.user));
            window.location.href = './home.html';
          } else {
            alert(data.error || 'Google Login failed');
          }
        })
        .catch(err => {
          console.error(err);
          alert('Network error connecting to server');
        });
      }

      window.onload = function () {
        google.accounts.id.initialize({
          client_id: "413245409637-d8p3ofoift1osdc2lhb2cfvg48djdtp8.apps.googleusercontent.com",
          callback: handleCredentialResponse
        });
        google.accounts.id.renderButton(
          document.getElementById("googleBtn"),
          { 
            theme: "outline", 
            size: "large", 
            width: "340",
            text: "continue_with",
            shape: "pill"
          }
        );
        // Optional: google.accounts.id.prompt(); // also display the One Tap dialog
      }
    </script>

  </body>
</html>
